services:
  - type: web
    name: ipo-reports
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ipo-reports-db
          property: connectionString

databases:
  - name: ipo-reports-db
    databaseName: ipo_reports_production
    plan: free
